<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Archivos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/slothui.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Container - Componente Compartido -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Content -->
    <main class="main-content">

      <div class="content">
        <!-- Stats -->
        <div class="row" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;">
          <div class="stat-card">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-files" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="total-files">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Total Archivos</div>
              </div>
            </div>
          </div>
          <div class="stat-card">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--success); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-hdd" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="total-size">0 MB</div>
                <div style="font-size: 13px; color: var(--text-muted);">Espacio Usado</div>
              </div>
            </div>
          </div>
          <div class="stat-card">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--warning); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-clock" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="recent-count">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Subidos Hoy</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Files Grid -->
        <div class="section-header">
          <h2 class="section-title">Todos los Archivos</h2>
          <div class="sort-dropdown">
            <span>Más recientes</span>
            <i class="bi bi-chevron-down"></i>
          </div>
        </div>
        
        <div class="file-grid" id="files-grid">
          <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-muted);">
            <i class="bi bi-arrow-clockwise" style="font-size: 32px; animation: spin 1s linear infinite;"></i>
            <p>Cargando archivos...</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="right-sidebar-container">
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Detalles</span>
        </div>
        
        <div class="file-preview" id="file-preview">
          <div class="file-preview-icon">
            <i class="bi bi-folder" style="color: var(--primary-color);"></i>
          </div>
          <div class="file-preview-title" id="preview-name">Selecciona un archivo</div>
          <div class="file-preview-meta" id="preview-meta">-</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Acciones</span>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <button class="btn-primary" id="btn-download" disabled onclick="window.downloadSelected()">
            <i class="bi bi-download"></i> Descargar
          </button>
          <button class="btn-secondary" id="btn-delete" disabled onclick="window.deleteSelected()">
            <i class="bi bi-trash"></i> Eliminar
          </button>
          <button class="btn-secondary" id="btn-share" disabled onclick="window.shareSelected()">
            <i class="bi bi-share"></i> Compartir
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Upload Modal -->
  <div class="modal" id="uploadModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 20px; width: 100%; max-width: 500px; margin: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0; font-size: 20px; font-weight: 600;">Subir Archivos</h5>
        <button onclick="window.closeUploadModal()" style="background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      <div style="padding: 24px;">
        <div id="dropZone" style="border: 2px dashed var(--border); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s;">
          <i class="bi bi-cloud-arrow-up" style="font-size: 56px; color: var(--primary-color);"></i>
          <p style="margin: 16px 0 8px; font-size: 16px; font-weight: 500;">Arrastra archivos aquí</p>
          <p style="font-size: 14px; color: var(--text-muted);">o haz clic para seleccionar</p>
          <input type="file" id="fileInput" multiple style="display: none;">
        </div>
        <div id="selectedFiles" style="margin-top: 16px;"></div>
      </div>
      <div style="padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px;">
        <button onclick="window.closeUploadModal()" style="padding: 12px 24px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;">Cancelar</button>
        <button class="btn-primary" id="uploadBtn" disabled onclick="window.uploadFiles()" style="padding: 12px 24px;">
          <i class="bi bi-upload"></i> Subir
        </button>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .stat-card { padding: 24px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); }
    .btn-secondary { padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Sidebar Component -->
  <script type="module" src="../../shared/components/sidebar.js"></script>
  <script type="module" src="../../shared/components/rightSidebar.js"></script>
  
  <script type="module">
    import { fileService } from '../../shared/services/fileServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';

    class FilesController {
      constructor() {
        this.files = [];
        this.selectedFile = null;
        this.viewMode = 'grid';
      }

      async init() {
        console.log('=== Files Controller Init ===');
        await this.loadFiles();
        this.setupEventListeners();
      }

      async loadFiles() {
        try {
          const files = await fileService.list(100);
          this.files = Array.isArray(files) ? files : [];
          console.log('Files loaded:', this.files.length);
        } catch (error) {
          console.error('Error loading files:', error);
          this.files = [];
        }
        this.renderFiles();
        this.updateStats();
        
        // Update sidebar
        if (window.sidebarComponent) {
          window.sidebarComponent.updateStats({ files: this.files.length });
          const user = await authService.getCurrentUser();
          window.sidebarComponent.updateUserInfo(user);
        }
      }

      setupEventListeners() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        if (dropZone && fileInput) {
          dropZone.addEventListener('click', () => fileInput.click());
          dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary-color)';
          });
          dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--border)';
          });
          dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            this.handleFiles(e.dataTransfer.files);
          });
          fileInput.addEventListener('change', (e) => this.handleFiles(e.target.files));
        }

        const searchInput = document.getElementById('searchFiles');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchFiles(e.target.value));
        }
      }

      handleFiles(files) {
        const container = document.getElementById('selectedFiles');
        if (!container) return;
        
        container.innerHTML = '';
        Array.from(files).forEach(file => {
          const div = document.createElement('div');
          div.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface-hover); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);';
          div.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px;">
              <i class="bi bi-file-earmark" style="color: var(--primary-color);"></i>
              <span style="font-size: 13px; font-weight: 500;">${file.name}</span>
            </div>
            <span style="font-size: 12px; color: var(--text-muted);">${this.formatSize(file.size)}</span>
          `;
          container.appendChild(div);
        });
        
        document.getElementById('uploadBtn').disabled = files.length === 0;
      }

      async uploadFiles() {
        const fileInput = document.getElementById('fileInput');
        const files = fileInput?.files;
        if (!files || files.length === 0) return;

        try {
          for (const file of files) {
            await fileService.upload(file);
          }
          this.closeUploadModal();
          await this.loadFiles();
          alert('Archivos subidos correctamente');
        } catch (error) {
          console.error('Upload error:', error);
          alert('Error al subir: ' + error.message);
        }
      }

      renderFiles() {
        const container = document.getElementById('files-grid');
        if (!container) return;

        if (this.files.length === 0) {
          container.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted);">
              <i class="bi bi-folder2-open" style="font-size: 64px; margin-bottom: 16px; display: block;"></i>
              <p style="font-size: 16px; margin-bottom: 8px;">No hay archivos</p>
              <button class="btn-primary" onclick="window.openUploadModal()">
                <i class="bi bi-plus-lg"></i> Subir primer archivo
              </button>
            </div>`;
          return;
        }

        container.innerHTML = this.files.map(file => {
          const iconClass = this.getFileIconClass(file.file_type);
          return `
            <div class="file-card" onclick="window.filesController.selectFile('${file.id}')" data-file-id="${file.id}">
              <div class="file-icon ${iconClass}">
                <i class="bi ${this.getFileIcon(file.file_type)}"></i>
              </div>
              <div class="file-name">${file.filename}</div>
              <div class="file-meta">${this.formatSize(file.size)} • ${this.formatDate(file.uploaded_at)}</div>
              <div class="file-actions">
                <button class="btn-icon" style="width: 28px; height: 28px;" onclick="event.stopPropagation(); window.filesController.downloadFile('${file.id}')">
                  <i class="bi bi-download" style="font-size: 12px;"></i>
                </button>
                <button class="btn-icon" style="width: 28px; height: 28px;" onclick="event.stopPropagation(); window.filesController.deleteFile('${file.id}')">
                  <i class="bi bi-trash" style="font-size: 12px;"></i>
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      selectFile(fileId) {
        document.querySelectorAll('.file-card').forEach(card => {
          card.style.borderColor = 'var(--border)';
          card.style.boxShadow = 'none';
        });
        
        const card = document.querySelector(`[data-file-id="${fileId}"]`);
        if (card) {
          card.style.borderColor = 'var(--primary-color)';
          card.style.boxShadow = '0 0 0 3px rgba(99, 102, 241, 0.1)';
        }
        
        const file = this.files.find(f => f.id === fileId);
        if (!file) return;
        
        this.selectedFile = file;
        document.getElementById('preview-name').textContent = file.filename;
        document.getElementById('preview-meta').textContent = this.formatSize(file.size) + ' • ' + this.formatDate(file.uploaded_at);
        
        document.getElementById('btn-download').disabled = false;
        document.getElementById('btn-delete').disabled = false;
        document.getElementById('btn-share').disabled = false;
      }

      updateStats() {
        const total = this.files.length;
        const totalSize = this.files.reduce((acc, f) => acc + (f.size || 0), 0);
        const today = new Date().toDateString();
        const todayCount = this.files.filter(f => new Date(f.uploaded_at).toDateString() === today).length;
        
        document.getElementById('total-files').textContent = total;
        document.getElementById('total-size').textContent = this.formatSize(totalSize);
        document.getElementById('recent-count').textContent = todayCount;
      }

      searchFiles(query) {
        if (!query) {
          this.renderFiles();
          return;
        }
        const filtered = this.files.filter(f => f.filename?.toLowerCase().includes(query.toLowerCase()));
        const allFiles = this.files;
        this.files = filtered;
        this.renderFiles();
        this.files = allFiles;
      }

      getFileIconClass(type) {
        if (!type) return 'code';
        if (type.includes('pdf')) return 'pdf';
        if (type.includes('word') || type.includes('document')) return 'doc';
        if (type.includes('image')) return 'img';
        return 'code';
      }

      getFileIcon(type) {
        if (!type) return 'bi-file-earmark-code';
        if (type.includes('pdf')) return 'bi-file-earmark-pdf';
        if (type.includes('word') || type.includes('document')) return 'bi-file-earmark-word';
        if (type.includes('image')) return 'bi-file-earmark-image';
        return 'bi-file-earmark-code';
      }

      formatSize(bytes) {
        if (!bytes) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
      }

      formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
      }

      openUploadModal() {
        document.getElementById('uploadModal').style.display = 'flex';
      }

      closeUploadModal() {
        document.getElementById('uploadModal').style.display = 'none';
        document.getElementById('fileInput').value = '';
        document.getElementById('selectedFiles').innerHTML = '';
        document.getElementById('uploadBtn').disabled = true;
      }

      async downloadSelected() {
        if (!this.selectedFile) return;
        await this.downloadFile(this.selectedFile.id);
      }

      async deleteSelected() {
        if (!this.selectedFile) return;
        await this.deleteFile(this.selectedFile.id);
      }

      shareSelected() {
        if (!this.selectedFile) return;
        alert('Función de compartir en desarrollo');
      }

      async downloadFile(fileId) {
        try {
          const { blob, filename } = await fileService.download(fileId);
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
        } catch (error) {
          console.error('Download error:', error);
          alert('Error al descargar: ' + error.message);
        }
      }

      async deleteFile(fileId) {
        if (!confirm('¿Eliminar este archivo?')) return;
        try {
          await fileService.delete(fileId);
          await this.loadFiles();
        } catch (error) {
          console.error('Delete error:', error);
          alert('Error al eliminar: ' + error.message);
        }
      }

      toggleView() {
        this.viewMode = this.viewMode === 'grid' ? 'list' : 'grid';
        const icon = document.getElementById('view-icon');
        const grid = document.getElementById('files-grid');
        
        if (this.viewMode === 'list') {
          icon.className = 'bi bi-list';
          grid.style.gridTemplateColumns = '1fr';
        } else {
          icon.className = 'bi bi-grid';
          grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(160px, 1fr))';
        }
      }
    }

    window.filesController = new FilesController();
    window.filesController.init();
    
    window.openUploadModal = () => window.filesController.openUploadModal();
    window.closeUploadModal = () => window.filesController.closeUploadModal();
    window.uploadFiles = () => window.filesController.uploadFiles();
    window.toggleView = () => window.filesController.toggleView();
    window.downloadSelected = () => window.filesController.downloadSelected();
    window.deleteSelected = () => window.filesController.deleteSelected();
    window.shareSelected = () => window.filesController.shareSelected();
  </script>
</body>
</html>
