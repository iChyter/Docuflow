<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Comentarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/slothui.css">
  <link rel="stylesheet" href="../../shared/styles/desktop.css" media="(min-width: 1201px)">
  <link rel="stylesheet" href="../../shared/styles/tablet.css" media="(min-width: 769px) and (max-width: 1200px)">
  <link rel="stylesheet" href="../../shared/styles/phone.css" media="(max-width: 768px)">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Container - Componente Compartido -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Content -->
      <div class="content">
        <!-- Stats Cards -->
        <div class="row" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;">
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-chat-dots" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="total-comments">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Total Comentarios</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Filter Buttons -->
        <div style="display: flex; gap: 10px; margin-bottom: 24px;">
          <button class="filter-btn active" data-filter="all" onclick="window.setFilter('all')" style="padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-weight: 500; transition: all 0.2s;">
            Todos
          </button>
        </div>

        <!-- Comments List -->
        <div id="comments-list" style="display: flex; flex-direction: column; gap: 16px;">
          <!-- Comments will be loaded here -->
        </div>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="right-sidebar-container">
      <!-- Nuevo Comentario Button -->
      <div style="padding: 16px; border-bottom: 1px solid var(--border);">
        <button class="btn-primary" onclick="window.openCommentModal()" style="width: 100%; justify-content: center; gap: 8px; padding: 14px;">
          <i class="bi bi-plus-lg"></i> Nuevo Comentario
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Detalles</span>
          <i class="bi bi-three-dots btn-more"></i>
        </div>
        
        <div class="file-preview" id="comment-preview">
          <div class="file-preview-icon" style="background: var(--surface-hover);">
            <i class="bi bi-chat-square-text" style="color: var(--primary-color); font-size: 32px;" id="preview-icon"></i>
          </div>
          <div class="file-preview-title" id="preview-author">Selecciona un comentario</div>
          <div class="file-preview-meta" id="preview-date">Haz clic en un comentario para verlo</div>
          <div class="file-preview-meta" id="preview-assignees" style="margin-top: 8px; color: var(--primary-color);"></div>
          <div class="file-preview-meta" id="preview-status" style="margin-top: 8px;"></div>
        </div>
      </div>

      <div class="sidebar-section" id="task-actions-section" style="display: none;">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Acciones</span>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <button id="btn-complete-task" onclick="window.completeTask()" style="padding: 10px 20px; border: none; border-radius: 10px; background: var(--success); color: white; cursor: pointer; opacity: 0.4;" disabled>
            <i class="bi bi-check-circle" id="btn-complete-icon"></i> <span id="btn-complete-text">Marcar como completada</span>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Acciones</span>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <button class="btn-secondary" style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; opacity: 0.4;" id="btn-assign-comment" disabled onclick="window.openAssignModal()">
            <i class="bi bi-person-check"></i> Asignar Comentario
          </button>
          <button class="btn-secondary" style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; color: var(--danger); opacity: 0.4;" id="btn-delete-comment" disabled onclick="window.deleteSelected()">
            <i class="bi bi-trash"></i> Eliminar Comentario
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Comment Modal -->
  <div class="modal" id="commentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 500px; margin: 20px;">
      <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0; font-size: 18px; font-weight: 600;">Nuevo Comentario</h5>
        <button onclick="window.closeCommentModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      <div style="padding: 24px;">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Contenido</label>
          <textarea id="commentContent" rows="4" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover); resize: vertical;" placeholder="Escribe tu comentario..."></textarea>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="commentIsTask" style="width: 18px; height: 18px; cursor: pointer;">
            <span style="font-weight: 500; font-size: 14px;">Marcar como tarea</span>
          </label>
        </div>
      </div>
      <div style="padding: 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px;">
        <button style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;" onclick="window.closeCommentModal()">Cancelar</button>
        <button class="btn-primary" onclick="window.saveComment()">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal" id="deleteModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 400px; margin: 20px;">
      <div style="padding: 24px; text-align: center;">
        <div style="width: 64px; height: 64px; background: var(--danger)20; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
          <i class="bi bi-exclamation-triangle" style="color: var(--danger); font-size: 32px;"></i>
        </div>
        <h5 style="margin: 0 0 8px; font-size: 18px; font-weight: 600;">¿Eliminar comentario?</h5>
        <p style="margin: 0; color: var(--text-muted); font-size: 14px;">Esta acción no se puede deshacer.</p>
      </div>
      <div style="padding: 0 24px 24px; display: flex; gap: 12px;">
        <button style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;" onclick="window.closeDeleteModal()">Cancelar</button>
        <button style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--danger); color: white; cursor: pointer; font-weight: 500;" onclick="window.confirmDelete()">
          <i class="bi bi-trash"></i> Eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- Assign Comment Modal -->
  <div class="modal" id="assignModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 450px; margin: 20px;">
      <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0; font-size: 18px; font-weight: 600;">Asignar Comentario</h5>
        <button onclick="window.closeAssignModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      <div style="padding: 24px;">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Asignar a:</label>
          <select id="assignSelect" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover); cursor: pointer;">
            <option value="">Seleccionar usuario...</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Asignar a múltiples usuarios (opcional):</label>
          <div id="assignUsersList" style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span style="padding: 6px 12px; background: var(--surface-hover); border-radius: 8px; font-size: 12px; color: var(--text-muted);">Selecciona usuarios arriba para agregar</span>
          </div>
        </div>
      </div>
      <div style="padding: 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px;">
        <button style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;" onclick="window.closeAssignModal()">Cancelar</button>
        <button class="btn-primary" onclick="window.saveAssignment()">
          <i class="bi bi-check-lg"></i> Asignar
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    };
  </script>
  
  <!-- Sidebar Component -->
  <script type="module" src="../../shared/components/sidebar.js"></script>
  <script type="module" src="../../shared/components/rightSidebar.js"></script>
  
  <script type="module">
    import { commentService } from '../../shared/services/commentServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';
    import { profileService } from '../../shared/services/profileService.js';

    // Auth guard
    authService.checkSession().then(async () => {
      const user = await authService.getCurrentUser();
      if (!user) {
        window.location.href = '../auth/login.html';
        return;
      }

    class CommentsController {
      constructor() {
        this.comments = [];
        this.filteredComments = [];
        this.selectedComment = null;
        this.currentFilter = 'all';
        this.loading = false;
        this.currentUserId = null;
        this.currentUserRole = null;
      }

      async init() {
        if (this.loading) return;
        this.loading = true;
        console.log('=== Comments Controller Init ===');
        
        await authService.checkSession();
        await this.loadCurrentUser();
        await this.loadComments();
        this.setupEventListeners();
        this.disableButtons(); // Disable buttons until a comment is selected
        
        // Update sidebar stats
        if (window.sidebarComponent) {
          window.sidebarComponent.updateStats({ comments: this.comments.length });
        }
        
        this.loading = false;
      }

      async loadCurrentUser() {
        try {
          const user = await authService.getCurrentUser();
          if (user) {
            this.currentUserId = user.id;
            const profile = await profileService.getCurrentProfile().catch(() => null);
            this.currentUserRole = profile?.role || 'user';
            console.log('Current user:', this.currentUserId, 'Role:', this.currentUserRole);
          } else {
            const profile = await profileService.getCurrentProfile().catch(() => null);
            if (profile) {
              this.currentUserId = profile.id;
              this.currentUserRole = profile.role || 'user';
            }
          }
        } catch (error) {
          console.warn('Error loading current user:', error);
          try {
            const user = await authService.getCurrentUser();
            if (user) {
              this.currentUserId = user.id;
              this.currentUserRole = 'user';
            }
          } catch (e) {
            console.error('Auth fallback also failed:', e);
          }
        }
      }

      canDelete(comment) {
        if (!this.currentUserId) return false;
        const isOwner = String(comment.author_id) === String(this.currentUserId) || String(comment.author) === String(this.currentUserId);
        const isAdmin = this.currentUserRole === 'admin';
        return isOwner || isAdmin;
      }

      canAssign(comment) {
        if (!this.currentUserId) return false;
        console.log('[canAssign] role:', this.currentUserRole);
        if (this.currentUserRole === 'admin') return true;
        const isAuthor = String(comment.author_id) === String(this.currentUserId) || String(comment.author) === String(this.currentUserId);
        const isColaborador = this.currentUserRole === 'colaborador';
        console.log('[canAssign] isAuthor:', isAuthor, 'isColaborador:', isColaborador);
        return isAuthor && isColaborador;
      }

      canComplete(comment) {
        if (!this.currentUserId) return false;
        if (this.currentUserRole === 'admin') return true;
        const isAuthor = String(comment.author_id) === String(this.currentUserId) || String(comment.author) === String(this.currentUserId);
        const isAssignee = comment.assignees?.map(a => String(a)).includes(String(this.currentUserId));
        return isAuthor || isAssignee;
      }

      async loadComments() {
        try {
          await authService.checkSession();
          const user = await authService.getCurrentUser();
          if (!user) {
            console.log('No authenticated user, showing empty state');
            this.comments = [];
            this.filteredComments = [];
            this.renderComments();
            this.updateStats();
            return;
          }
          
          const token = authService.getToken();
          console.log('Token available:', !!token);
          
          const result = await commentService.list(100);
          this.comments = Array.isArray(result) ? result : [];
          this.filteredComments = [...this.comments];
          console.log('Comments loaded:', this.comments.length);
        } catch (error) {
          console.error('Error loading comments:', error);
          this.comments = [];
          this.filteredComments = [];
        }
        this.renderComments();
        this.updateStats();
      }

      setupEventListeners() {
        // Search
        const searchInput = document.getElementById('searchComments');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchComments(e.target.value));
        }
      }

      renderComments() {
        const container = document.getElementById('comments-list');
        if (!container) return;
        
        if (this.filteredComments.length === 0) {
          if (!this.currentUserId) {
            container.innerHTML = `
              <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
                <i class="bi bi-chat-square-text" style="font-size: 64px; margin-bottom: 16px; display: block;"></i>
                <p style="font-size: 16px; margin-bottom: 8px;">Inicia sesión para ver comentarios</p>
                <a href="../auth/login.html" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 10px; text-decoration: none;">
                  <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </a>
              </div>`;
          } else {
            container.innerHTML = `
              <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
                <i class="bi bi-chat-square-text" style="font-size: 64px; margin-bottom: 16px; display: block;"></i>
                <p style="font-size: 16px; margin-bottom: 8px;">No hay comentarios</p>
                <button class="btn-primary" onclick="window.openCommentModal()">
                  <i class="bi bi-plus-lg"></i> Agregar comentario
                </button>
              </div>`;
          }
          return;
        }

        container.innerHTML = this.filteredComments.map(comment => {
          const authorName = comment.author_username || comment.author || 'Usuario';
          const isTask = comment.is_task;
          const isCompleted = comment.completed;
          const iconClass = isTask ? (isCompleted ? 'bi-check-circle-fill text-success' : 'bi-list-task text-primary') : 'bi-chat-dots text-primary';
          const iconBg = isTask ? (isCompleted ? 'var(--success)20' : 'var(--primary-color)20') : 'var(--primary-color)20';
          const titleStyle = isCompleted ? 'text-decoration: line-through; opacity: 0.7;' : '';
          const completedBorder = isCompleted ? 'border-color: var(--success) !important; box-shadow: 0 0 0 2px var(--success)30;' : '';
          
          const assigneesCount = comment.assignees?.length || 0;
          const assigneesHtml = assigneesCount > 0
            ? `<div style="font-size: 12px; color: var(--primary-color); margin-top: 4px;">
                <i class="bi bi-person-check"></i> Asignado a ${assigneesCount} usuario${assigneesCount > 1 ? 's' : ''}
               </div>`
            : '';
          
          const completedBadge = isCompleted
            ? `<span class="badge bg-success ms-2" style="font-size: 10px;"><i class="bi bi-check"></i> Completada</span>`
            : '';
          
          return `
            <div class="card comment-card ${isTask ? 'task-card' : ''}" data-comment-id="${comment.id}" style="padding: 20px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; ${completedBorder} ${isCompleted ? 'opacity: 0.8;' : ''}">
              <div style="display: flex; gap: 16px;">
                <div style="width: 40px; height: 40px; background: ${iconBg}; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  <i class="bi ${iconClass}" style="font-size: 20px;"></i>
                </div>
                <div style="flex: 1;">
                  <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                    <div style="font-weight: 600; font-size: 14px; color: var(--text-primary); ${titleStyle}">
                      ${authorName} ${isTask ? '<span class="badge bg-primary ms-1" style="font-size: 10px;">Tarea</span>' : ''} ${completedBadge}
                    </div>
                    <div style="font-size: 12px; color: var(--text-muted);">${this.formatDate(comment.created_at)}</div>
                  </div>
                  <div style="font-size: 14px; color: var(--text-secondary); line-height: 1.5; ${titleStyle}">${comment.content}</div>
                  ${assigneesHtml}
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        container.onclick = (e) => {
          const card = e.target.closest('.comment-card');
          if (card) {
            const commentId = card.dataset.commentId;
            this.selectComment(commentId);
          }
        };
      }

      disableButtons() {
        const deleteBtn = document.getElementById('btn-delete-comment');
        if (deleteBtn) {
          deleteBtn.disabled = true;
          deleteBtn.style.opacity = '0.4';
          deleteBtn.title = 'Selecciona un comentario primero';
        }
        const assignBtn = document.getElementById('btn-assign-comment');
        if (assignBtn) {
          assignBtn.disabled = true;
          assignBtn.style.opacity = '0.4';
          assignBtn.title = 'Selecciona un comentario primero';
        }
        
        // Hide task actions section
        const taskActionsSection = document.getElementById('task-actions-section');
        if (taskActionsSection) {
          taskActionsSection.style.display = 'none';
        }
        const completeBtn = document.getElementById('btn-complete-task');
        if (completeBtn) {
          completeBtn.disabled = true;
          completeBtn.style.opacity = '0.4';
        }
      }

      enableButtonsForComment(comment) {
        const canDelete = this.canDelete(comment);
        const canAssign = this.canAssign(comment);
        const canComplete = this.canComplete(comment);
        
        console.log('[enableButtons] currentUserRole:', this.currentUserRole, 'comment.author_id:', comment.author_id, 'currentUserId:', this.currentUserId);
        console.log('[enableButtons] canDelete:', canDelete, 'canAssign:', canAssign, 'canComplete:', canComplete);
        
        const deleteBtn = document.getElementById('btn-delete-comment');
        if (deleteBtn) {
          deleteBtn.disabled = false;
          deleteBtn.style.opacity = canDelete ? '1' : '0.6';
          deleteBtn.title = canDelete ? 'Eliminar comentario' : 'Solo el autor o un admin pueden eliminar';
        }
        
        const assignBtn = document.getElementById('btn-assign-comment');
        if (assignBtn) {
          assignBtn.disabled = !canAssign;
          assignBtn.style.opacity = canAssign ? '1' : '0.4';
          assignBtn.title = canAssign ? 'Asignar comentario' : 'Solo el autor (colaborador) o admin pueden asignar';
        }
        
        const taskActionsSection = document.getElementById('task-actions-section');
        const completeBtn = document.getElementById('btn-complete-task');
        const completeText = document.getElementById('btn-complete-text');
        const canCompleteTask = this.canComplete(comment);
        
        console.log('[enableButtons] is_task:', comment.is_task, 'canComplete:', canCompleteTask);
        
        if (canCompleteTask) {
          if (taskActionsSection) taskActionsSection.style.display = 'block';
          if (completeBtn) {
            completeBtn.disabled = false;
            completeBtn.style.opacity = '1';
            if (comment.completed) {
              completeBtn.style.background = 'var(--surface-hover)';
              completeBtn.style.color = 'var(--text-secondary)';
              completeBtn.style.border = '1px solid var(--border)';
              if (completeText) completeText.textContent = 'Marcar como pendiente';
              const btnIcon = document.getElementById('btn-complete-icon');
              if (btnIcon) btnIcon.className = 'bi bi-arrow-counterclockwise';
            } else {
              completeBtn.style.background = 'var(--success)';
              completeBtn.style.color = 'white';
              completeBtn.style.border = 'none';
              if (completeText) completeText.textContent = 'Marcar como completada';
              const btnIcon = document.getElementById('btn-complete-icon');
              if (btnIcon) btnIcon.className = 'bi bi-check-circle';
            }
          }
        } else {
          if (taskActionsSection) taskActionsSection.style.display = 'none';
        }
      }

      selectComment(commentId) {
        // Remove previous selection
        document.querySelectorAll('.comment-card').forEach(card => {
          card.style.borderColor = 'var(--border)';
          card.style.boxShadow = 'none';
        });
        
        // Add selection to current
        const card = document.querySelector(`[data-comment-id="${commentId}"]`);
        if (card) {
          card.style.borderColor = 'var(--primary-color)';
          card.style.boxShadow = '0 0 0 3px rgba(99, 102, 241, 0.1)';
        }
        
        // Find the comment - handle both string and number id comparison
        const comment = this.comments.find(c => String(c.id) === String(commentId));
        console.log('[selectComment] Looking for:', commentId, 'found:', !!comment);
        if (!comment) return;
        
        // Update selected comment
        this.selectedComment = comment;
        
        document.getElementById('preview-author').textContent = comment.author_username || comment.author || 'Usuario';
        document.getElementById('preview-date').textContent = this.formatDate(comment.created_at);
        
        const previewIcon = document.getElementById('preview-icon');
        const previewStatus = document.getElementById('preview-status');
        const canUserComplete = this.canComplete(comment);
        
        if (comment.completed) {
          previewIcon.className = 'bi bi-check-circle-fill';
          previewIcon.style.color = 'var(--success)';
          previewStatus.innerHTML = '<span style="color: var(--success);"><i class="bi bi-check-circle"></i> Completada</span>';
        } else if (canUserComplete) {
          previewIcon.className = comment.is_task ? 'bi bi-list-task' : 'bi bi-chat-square-text';
          previewIcon.style.color = 'var(--warning)';
          previewStatus.innerHTML = '<span style="color: var(--warning);"><i class="bi bi-clock"></i> Pendiente</span>';
        } else {
          previewIcon.className = comment.is_task ? 'bi bi-list-task' : 'bi bi-chat-square-text';
          previewIcon.style.color = 'var(--primary-color)';
          previewStatus.innerHTML = '';
        }
        
        // Load and display assignees
        this.loadAssigneesDisplay(comment);
        
        // Enable buttons
        this.enableButtonsForComment(comment);
      }

      completeTask() {
        const comment = window.commentsController?.selectedComment;
        if (!comment) {
          return;
        }
        
        const newCompletedStatus = !comment.completed;
        
        commentService.complete(comment.id, newCompletedStatus).then(() => {
          comment.completed = newCompletedStatus;
          window.commentsController.selectComment(comment.id);
        }).catch(error => {
          console.error('Error completing task:', error);
        });
      }

      async loadAssigneesDisplay(comment) {
        const assigneesDiv = document.getElementById('preview-assignees');
        if (!assigneesDiv) return;
        
        if (!comment.assignees || comment.assignees.length === 0) {
          assigneesDiv.innerHTML = '';
          return;
        }
        
        try {
          const { supabase } = await import('../../shared/services/supabaseClient.js');
          const { data: profiles } = await supabase
            .from('profiles')
            .select('id, username, full_name')
            .in('id', comment.assignees);
          
          if (profiles && profiles.length > 0) {
            const currentUserId = this.currentUserId;
            const names = profiles.map(p => {
              const isCurrentUser = String(p.id) === String(currentUserId);
              const name = p.full_name || p.username;
              return isCurrentUser ? `<strong style="color: var(--primary-color);">${name} (tú)</strong>` : name;
            }).join(', ');
            assigneesDiv.innerHTML = `<i class="bi bi-person-check"></i> Asignado a: ${names}`;
          } else {
            assigneesDiv.innerHTML = '';
          }
        } catch (error) {
          console.error('Error loading assignees:', error);
          assigneesDiv.innerHTML = '';
        }
      }

      setFilter(filter) {
        this.currentFilter = filter;
        
        // Update button states
        document.querySelectorAll('.filter-btn').forEach(btn => {
          if (btn.dataset.filter === filter) {
            btn.style.background = 'var(--primary-color)';
            btn.style.color = 'white';
            btn.style.borderColor = 'var(--primary-color)';
          } else {
            btn.style.background = 'var(--surface)';
            btn.style.color = 'var(--text-primary)';
            btn.style.borderColor = 'var(--border)';
          }
        });
        
        // Show all comments (no filtering by type since tasks removed)
        this.filteredComments = [...this.comments];
        
        this.renderComments();
      }

      searchComments(query) {
        if (!query) {
          this.setFilter(this.currentFilter);
          return;
        }
        
        const lowerQuery = query.toLowerCase();
        this.filteredComments = this.comments.filter(c => 
          c.content?.toLowerCase().includes(lowerQuery) ||
          c.author?.toLowerCase().includes(lowerQuery)
        );
        
        this.renderComments();
      }

      updateStats() {
        const total = this.comments.length;

        document.getElementById('total-comments').textContent = total;
        
        // Update sidebar stats
        if (window.sidebarComponent) {
          window.sidebarComponent.updateStats({ comments: total });
        }
      }

      async saveComment() {
        const content = document.getElementById('commentContent').value.trim();
        const isTask = document.getElementById('commentIsTask').checked;
        
        if (!content) {
          alert('Por favor escribe un comentario');
          return;
        }

        try {
          await commentService.create(content, null, isTask, []);
          
          this.closeCommentModal();
          document.getElementById('commentIsTask').checked = false;
          await this.loadComments();
        } catch (error) {
          console.error('Error saving comment:', error);
          alert('Error al guardar: ' + error.message);
        }
      }

      deleteSelected() {
        const comment = window.commentsController?.selectedComment;
        if (!comment) {
          alert('Selecciona un comentario primero');
          return;
        }
        if (!window.commentsController.canDelete(comment)) {
          alert('No tienes permiso para eliminar este comentario');
          return;
        }
        window.commentsController.openDeleteModal();
      }

      confirmDelete() {
        const comment = window.commentsController?.selectedComment;
        if (!comment) return;
        commentService.delete(comment.id).then(() => {
          window.commentsController.selectedComment = null;
          window.commentsController.closeDeleteModal();
          window.commentsController.loadComments();
        }).catch(error => {
          console.error('Error deleting comment:', error);
          alert('Error al eliminar: ' + error.message);
        });
      }

      openDeleteModal() {
        document.getElementById('deleteModal').style.display = 'flex';
      }

      closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
      }

      formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      }

      openCommentModal() {
        document.getElementById('commentModal').style.display = 'flex';
        document.getElementById('commentContent').value = '';
      }

      closeCommentModal() {
        document.getElementById('commentModal').style.display = 'none';
      }

      openAssignModal() {
        const comment = window.commentsController?.selectedComment;
        if (!comment) {
          alert('Selecciona un comentario primero');
          return;
        }
        
        this.loadUsers().then(users => {
          const select = document.getElementById('assignSelect');
          select.innerHTML = '<option value="">Seleccionar usuario...</option>';
          
          users.forEach(user => {
            const isAlreadyAssigned = comment.assignees?.includes(user.id);
            const displayName = user.full_name || user.username || 'Usuario sin nombre';
            select.innerHTML += `<option value="${user.id}" ${isAlreadyAssigned ? 'disabled' : ''}>${displayName}</option>`;
          });
          
          document.getElementById('assignModal').style.display = 'flex';
        }).catch(error => {
          console.error('Error loading users:', error);
          alert('Error al cargar usuarios');
        });
      }

      closeAssignModal() {
        document.getElementById('assignModal').style.display = 'none';
      }

      saveAssignment() {
        const comment = window.commentsController?.selectedComment;
        if (!comment) {
          alert('Selecciona un comentario primero');
          return;
        }
        
        const select = document.getElementById('assignSelect');
        const userId = select.value;
        
        if (!userId) {
          alert('Por favor selecciona un usuario');
          return;
        }

        const currentAssignees = comment.assignees || [];
        const newAssignees = [...currentAssignees, userId];
        
        commentService.assign(comment.id, newAssignees).then(() => {
          window.commentsController.closeAssignModal();
          window.commentsController.loadComments().then(() => {
            // Re-select the comment to refresh assignees display
            window.commentsController.selectComment(comment.id);
          });
          alert('Usuario asignado correctamente');
        }).catch(error => {
          console.error('Error assigning comment:', error);
          alert('Error al asignar: ' + error.message);
        });
      }

      async loadUsers() {
        try {
          console.log('[loadUsers] Loading users...');
          const { supabase } = await import('../../shared/services/supabaseClient.js');
          console.log('[loadUsers] supabase client loaded');
          
          const { data: users, error } = await supabase
            .from('profiles')
            .select('id, username, full_name')
            .order('username');
          
          console.log('[loadUsers] Result:', users, error);
          
          if (error) {
            console.error('[loadUsers] Error:', error);
          }
          
          return users || [];
        } catch (error) {
          console.error('[loadUsers] Catch error:', error);
          return [];
        }
      }
    }

    // Initialize controller
    const commentsController = new CommentsController();
    commentsController.init();
    window.commentsController = commentsController;
    
    window.openCommentModal = () => window.commentsController.openCommentModal();
    window.closeCommentModal = () => window.commentsController.closeCommentModal();
    window.saveComment = () => window.commentsController.saveComment();
    window.setFilter = (filter) => window.commentsController.setFilter(filter);
    window.deleteSelected = () => window.commentsController.deleteSelected();
    window.confirmDelete = () => window.commentsController.confirmDelete();
    window.closeDeleteModal = () => window.commentsController.closeDeleteModal();
    window.openAssignModal = () => window.commentsController.openAssignModal();
    window.closeAssignModal = () => window.commentsController.closeAssignModal();
    window.saveAssignment = () => window.commentsController.saveAssignment();
    window.completeTask = () => window.commentsController.completeTask();
    }); // End auth guard
  </script>
</body>
</html>
