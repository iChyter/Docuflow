<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/slothui.css">
  <link rel="stylesheet" href="../../shared/styles/desktop.css" media="(min-width: 1201px)">
  <link rel="stylesheet" href="../../shared/styles/tablet.css" media="(min-width: 769px) and (max-width: 1200px)">
  <link rel="stylesheet" href="../../shared/styles/phone.css" media="(max-width: 768px)">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Compartido -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Content -->
    <main class="main-content">

      <div class="content">
        <!-- Perfil Section -->
        <div class="card" style="padding: 32px; border-radius: 16px; border: 1px solid var(--border); max-width: 600px;">
          <h3 style="margin-bottom: 24px; font-size: 20px; font-weight: 600;">Mi Perfil</h3>
          
          <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 32px;">
            <div style="width: 80px; height: 80px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: 600;" id="user-avatar">
              U
            </div>
            <div>
              <div style="font-size: 20px; font-weight: 600;" id="user-display-name">Usuario</div>
              <div style="font-size: 14px; color: var(--text-muted);" id="user-email">-</div>
              <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">
                <span style="padding: 4px 12px; border-radius: 12px; background: var(--primary-light); color: white;" id="user-role">
                  Colaborador
                </span>
              </div>
            </div>
          </div>

          <form id="profile-form" onsubmit="return false;">
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Nombre de Usuario</label>
              <input type="text" id="username" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover);" placeholder="Tu nombre de usuario">
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Este nombre se mostrará en tus comentarios y archivos</div>
            </div>

            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Nombre Completo</label>
              <input type="text" id="fullname" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover);" placeholder="Tu nombre completo">
            </div>

            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Email</label>
              <input type="email" id="email" disabled style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover); opacity: 0.7;" placeholder="Tu email">
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">El email no se puede cambiar</div>
            </div>

            <button class="btn-primary" onclick="window.saveProfile()" id="save-btn" style="padding: 12px 24px;">
              <i class="bi bi-check-lg"></i> Guardar Cambios
            </button>
            <span id="save-msg" style="margin-left: 12px; font-size: 14px; color: var(--success); display: none;">¡Guardado!</span>
          </form>
        </div>

        <!-- Cambiar Contraseña Section -->
        <div class="card" style="padding: 32px; border-radius: 16px; border: 1px solid var(--border); max-width: 600px; margin-top: 24px;">
          <h3 style="margin-bottom: 24px; font-size: 20px; font-weight: 600;">Cambiar Contraseña</h3>
          
          <form onsubmit="return false;">
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Nueva Contraseña</label>
              <input type="password" id="new-password" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover);" placeholder="Mínimo 6 caracteres">
            </div>

            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Confirmar Contraseña</label>
              <input type="password" id="confirm-password" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover);" placeholder="Repite la contraseña">
            </div>

            <button class="btn-primary" onclick="window.changePassword()" id="password-btn" style="padding: 12px 24px;">
              <i class="bi bi-key"></i> Cambiar Contraseña
            </button>
            <span id="password-msg" style="margin-left: 12px; font-size: 14px; color: var(--success); display: none;">¡Contraseña actualizada!</span>
          </form>
        </div>

        <!-- Cerrar Sesión -->
        <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border); max-width: 600px; margin-top: 24px;">
          <h3 style="margin-bottom: 16px; font-size: 18px; font-weight: 600;">Zona de Peligro</h3>
          <p style="color: var(--text-muted); margin-bottom: 16px;">Cierra sesión en este dispositivo.</p>
          <button class="btn-danger" onclick="window.logout()" style="padding: 12px 24px; background: var(--danger); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 500;">
            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
          </button>
        </div>
      </div>
    </main>

    <!-- Right Sidebar - Action Buttons -->
    <aside class="right-sidebar" id="right-sidebar-container"></aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Sidebar Component -->
  <script type="module" src="../../shared/components/sidebar.js"></script>
  <script type="module" src="../../shared/components/rightSidebar.js"></script>
  
  <script type="module">
    import { userService } from '../../shared/services/userServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';
    import { supabase } from '../../shared/services/supabaseClient.js';

    class SettingsController {
      constructor() {
        this.user = null;
        this.profile = null;
      }

      async init() {
        await this.loadUserData();
      }

      async loadUserData() {
        try {
          // Get current user from auth
          this.user = await authService.getCurrentUser();
          
          if (!this.user) {
            alert('No hay sesión activa');
            window.location.href = '../auth/login.html';
            return;
          }

          // Get profile data
          try {
            this.profile = await userService.getProfile();
          } catch (e) {
            console.log('Profile not found, creating...');
            this.profile = null;
          }

          // Update UI
          this.updateUI();
        } catch (error) {
          console.error('Error loading user data:', error);
        }
      }

      updateUI() {
        // Basic user info
        const email = this.user?.email || '-';
        const username = this.user?.user_metadata?.username || this.profile?.username || '';
        const fullname = this.user?.user_metadata?.full_name || this.profile?.full_name || '';
        const role = this.profile?.role || 'usuario';
        
        const roleLabels = {
          'admin': 'Administrador',
          'colaborador': 'Colaborador',
          'usuario': 'Usuario'
        };
        
        document.getElementById('user-email').textContent = email;
        document.getElementById('user-display-name').textContent = username || fullname || 'Usuario';
        document.getElementById('user-avatar').textContent = this.getInitials(username || fullname || 'Usuario');
        document.getElementById('user-role').textContent = roleLabels[role] || 'Usuario';
        
        // Form fields
        document.getElementById('username').value = username || '';
        document.getElementById('fullname').value = fullname || '';
        document.getElementById('email').value = email;
      }

      getInitials(name) {
        if (!name) return 'U';
        return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      }

      async saveProfile() {
        const username = document.getElementById('username').value.trim();
        const fullname = document.getElementById('fullname').value.trim();
        const saveBtn = document.getElementById('save-btn');
        const saveMsg = document.getElementById('save-msg');

        if (!username) {
          alert('El nombre de usuario es requerido');
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

        try {
          // Update auth metadata
          const { error: authError } = await supabase.auth.updateUser({
            data: {
              username: username,
              full_name: fullname
            }
          });

          if (authError) throw authError;

          // Update profile table
          try {
            await userService.updateProfile({
              username,
              full_name: fullname
            });
          } catch (profileError) {
            console.log('Profile update note:', profileError);
          }

          // Update local display
          document.getElementById('user-display-name').textContent = username || fullname || 'Usuario';
          document.getElementById('user-avatar').textContent = this.getInitials(username || fullname || 'Usuario');

          saveMsg.style.display = 'inline';
          setTimeout(() => {
            saveMsg.style.display = 'none';
          }, 3000);

        } catch (error) {
          console.error('Error saving profile:', error);
          alert('Error al guardar: ' + error.message);
        } finally {
          saveBtn.disabled = false;
          saveBtn.innerHTML = '<i class="bi bi-check-lg"></i> Guardar Cambios';
        }
      }

      async changePassword() {
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const passwordBtn = document.getElementById('password-btn');
        const passwordMsg = document.getElementById('password-msg');

        if (!newPassword || newPassword.length < 6) {
          alert('La contraseña debe tener al menos 6 caracteres');
          return;
        }

        if (newPassword !== confirmPassword) {
          alert('Las contraseñas no coinciden');
          return;
        }

        passwordBtn.disabled = true;
        passwordBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Cambiando...';

        try {
          await userService.changePassword(newPassword);
          
          passwordMsg.style.display = 'inline';
          document.getElementById('new-password').value = '';
          document.getElementById('confirm-password').value = '';
          
          setTimeout(() => {
            passwordMsg.style.display = 'none';
          }, 3000);

        } catch (error) {
          console.error('Error changing password:', error);
          alert('Error al cambiar contraseña: ' + error.message);
        } finally {
          passwordBtn.disabled = false;
          passwordBtn.innerHTML = '<i class="bi bi-key"></i> Cambiar Contraseña';
        }
      }
    }

    const settings = new SettingsController();
    window.settings = settings;

    // Initialize immediately
    settings.init();

    window.saveProfile = () => settings.saveProfile();
    window.changePassword = () => settings.changePassword();
    window.logout = async () => {
      if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
        await authService.logout();
        window.location.href = '../auth/login.html';
      }
    };
  </script>
</body>
</html>
