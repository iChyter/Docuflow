<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Comentarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/slothui.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Container - Componente Compartido -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Content -->
      <div class="content">
        <!-- Stats Cards -->
        <div class="row" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;">
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-chat-dots" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="total-comments">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Total Comentarios</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Filter Buttons -->
        <div style="display: flex; gap: 10px; margin-bottom: 24px;">
          <button class="filter-btn active" data-filter="all" onclick="window.setFilter('all')" style="padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-weight: 500; transition: all 0.2s;">
            Todos
          </button>
        </div>

        <!-- Comments List -->
        <div id="comments-list" style="display: flex; flex-direction: column; gap: 16px;">
          <!-- Comments will be loaded here -->
        </div>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="right-sidebar-container">
      <!-- Nuevo Comentario Button -->
      <div style="padding: 16px; border-bottom: 1px solid var(--border);">
        <button class="btn-primary" onclick="window.openCommentModal()" style="width: 100%; justify-content: center; gap: 8px; padding: 14px;">
          <i class="bi bi-plus-lg"></i> Nuevo Comentario
        </button>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Detalles</span>
          <i class="bi bi-three-dots btn-more"></i>
        </div>
        
        <div class="file-preview" id="comment-preview">
          <div class="file-preview-icon" style="background: var(--surface-hover);">
            <i class="bi bi-chat-square-text" style="color: var(--primary-color); font-size: 32px;"></i>
          </div>
          <div class="file-preview-title" id="preview-author">Selecciona un comentario</div>
          <div class="file-preview-meta" id="preview-date">-</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Acciones</span>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <button class="btn-secondary" style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer;" id="btn-assign-comment" disabled onclick="window.openAssignModal()">
            <i class="bi bi-person-check"></i> Asignar Comentario
          </button>
          <button class="btn-secondary" style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; color: var(--danger);" id="btn-delete-comment" disabled onclick="window.deleteSelected()">
            <i class="bi bi-trash"></i> Eliminar Comentario
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Comment Modal -->
  <div class="modal" id="commentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 500px; margin: 20px;">
      <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0; font-size: 18px; font-weight: 600;">Nuevo Comentario</h5>
        <button onclick="window.closeCommentModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      <div style="padding: 24px;">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Contenido</label>
          <textarea id="commentContent" rows="4" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover); resize: vertical;" placeholder="Escribe tu comentario..."></textarea>
        </div>
      </div>
      <div style="padding: 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px;">
        <button style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;" onclick="window.closeCommentModal()">Cancelar</button>
        <button class="btn-primary" onclick="window.saveComment()">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal" id="deleteModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 400px; margin: 20px;">
      <div style="padding: 24px; text-align: center;">
        <div style="width: 64px; height: 64px; background: var(--danger)20; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
          <i class="bi bi-exclamation-triangle" style="color: var(--danger); font-size: 32px;"></i>
        </div>
        <h5 style="margin: 0 0 8px; font-size: 18px; font-weight: 600;">¿Eliminar comentario?</h5>
        <p style="margin: 0; color: var(--text-muted); font-size: 14px;">Esta acción no se puede deshacer.</p>
      </div>
      <div style="padding: 0 24px 24px; display: flex; gap: 12px;">
        <button style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;" onclick="window.closeDeleteModal()">Cancelar</button>
        <button style="flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--danger); color: white; cursor: pointer; font-weight: 500;" onclick="window.confirmDelete()">
          <i class="bi bi-trash"></i> Eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- Assign Comment Modal -->
  <div class="modal" id="assignModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 450px; margin: 20px;">
      <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0; font-size: 18px; font-weight: 600;">Asignar Comentario</h5>
        <button onclick="window.closeAssignModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      <div style="padding: 24px;">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Asignar a:</label>
          <select id="assignSelect" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; font-size: 14px; background: var(--surface-hover); cursor: pointer;">
            <option value="">Seleccionar usuario...</option>
          </select>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px;">Asignar a múltiples usuarios (opcional):</label>
          <div id="assignUsersList" style="display: flex; flex-wrap: wrap; gap: 8px;">
            <span style="padding: 6px 12px; background: var(--surface-hover); border-radius: 8px; font-size: 12px; color: var(--text-muted);">Selecciona usuarios arriba para agregar</span>
          </div>
        </div>
      </div>
      <div style="padding: 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px;">
        <button style="padding: 10px 20px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; font-weight: 500;" onclick="window.closeAssignModal()">Cancelar</button>
        <button class="btn-primary" onclick="window.saveAssignment()">
          <i class="bi bi-check-lg"></i> Asignar
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    window.APP_CONFIG = {
      SUPABASE_URL: 'https://nlgcevktvqwgddibxsja.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZ2Nldmt0dnF3Z2RkaWJ4c2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTEzMDIsImV4cCI6MjA4OTI2NzMwMn0.bGRQHbEcrQMKnacIqM76aCS86wOEyL1p4O-4enZypXE'
    };
  </script>
  
  <!-- Sidebar Component -->
  <script type="module" src="../../shared/components/sidebar.js"></script>
  <script type="module" src="../../shared/components/rightSidebar.js"></script>
  
  <script type="module">
    import { commentService } from '../../shared/services/commentServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';
    import { profileService } from '../../shared/services/profileService.js';
    import { supabase } from '../../shared/services/supabaseClient.js';

    class CommentsController {
      constructor() {
        this.comments = [];
        this.filteredComments = [];
        this.selectedComment = null;
        this.currentFilter = 'all';
        this.loading = false;
        this.currentUserId = null;
        this.currentUserRole = null;
        this.selectedAssignees = [];
      }

      async init() {
        if (this.loading) return;
        this.loading = true;
        console.log('=== Comments Controller Init ===');
        
        await this.loadCurrentUser();
        await this.loadComments();
        this.setupEventListeners();
        
        // Update sidebar stats
        if (window.sidebarComponent) {
          window.sidebarComponent.updateStats({ comments: this.comments.length });
        }
        
        this.loading = false;
      }

      async loadCurrentUser() {
        try {
          const profile = await profileService.getCurrentProfile();
          if (profile) {
            this.currentUserId = profile.id;
            this.currentUserRole = profile.role || 'user';
            console.log('Current user:', this.currentUserId, this.currentUserRole);
          }
        } catch (error) {
          console.error('Error loading current user:', error);
          // Fallback: try authService
          try {
            const user = await authService.getCurrentUser();
            if (user) {
              this.currentUserId = user.id;
              this.currentUserRole = 'user';
            }
          } catch (e) {
            console.error('Fallback also failed:', e);
          }
        }
      }

      async loadUsersForAssign() {
        try {
          const { data: users, error } = await supabase
            .from('profiles')
            .select('id, username, full_name, role')
            .order('username');
          
          if (error) throw error;

          const assignSelect = document.getElementById('assignSelect');
          if (assignSelect) {
            assignSelect.innerHTML = '<option value="">Seleccionar usuario...</option>';
            users.forEach(user => {
              const option = document.createElement('option');
              option.value = user.id;
              option.textContent = `${user.username || user.full_name || 'Usuario'} (${user.role})`;
              assignSelect.appendChild(option);
            });
          }
        } catch (error) {
          console.error('Error loading users:', error);
        }
      }

      async assignComment(assigneeIds) {
        if (!this.selectedComment) return;
        
        if (assigneeIds.length === 0) {
          alert('Por favor selecciona al menos un usuario');
          return;
        }

        try {
          for (const assigneeId of assigneeIds) {
            await commentService.assign(this.selectedComment.id, [assigneeId]);
          }
          this.closeAssignModal();
          await this.loadComments();
          showNotification('Comentario asignado correctamente', 'success');
        } catch (error) {
          console.error('Error assigning comment:', error);
          alert('Error al asignar: ' + error.message);
        }
      }

      canDelete(comment) {
        if (!this.currentUserId) return false;
        const isOwner = comment.author_id === this.currentUserId || comment.author === this.currentUserId;
        const isAdmin = this.currentUserRole === 'admin';
        return isOwner || isAdmin;
      }

      async loadComments() {
        try {
          const result = await commentService.list(100);
          this.comments = Array.isArray(result) ? result : [];
          this.filteredComments = [...this.comments];
          console.log('Comments loaded:', this.comments.length);
        } catch (error) {
          console.error('Error loading comments:', error);
          this.comments = [];
          this.filteredComments = [];
        }
        this.renderComments();
        this.updateStats();
        await this.loadUsersForAssign();
      }

      setupEventListeners() {
        // Search
        const searchInput = document.getElementById('searchComments');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchComments(e.target.value));
        }
      }

      renderComments() {
        const container = document.getElementById('comments-list');
        if (!container) return;

        if (this.filteredComments.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
              <i class="bi bi-chat-square-text" style="font-size: 64px; margin-bottom: 16px; display: block;"></i>
              <p style="font-size: 16px; margin-bottom: 8px;">No hay comentarios</p>
              <button class="btn-primary" onclick="window.openCommentModal()">
                <i class="bi bi-plus-lg"></i> Agregar comentario
              </button>
            </div>`;
          return;
        }

        container.innerHTML = this.filteredComments.map(comment => {
          return `
            <div class="card comment-card" onclick="window.commentsController.selectComment('${comment.id}')" data-comment-id="${comment.id}" style="padding: 20px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;">
              <div style="display: flex; gap: 16px;">
                <div style="width: 40px; height: 40px; background: var(--primary-color)20; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  <i class="bi bi-chat-dots" style="color: var(--primary-color); font-size: 20px;"></i>
                </div>
                <div style="flex: 1;">
                  <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
                    <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">${comment.author_username || comment.author || 'Usuario'}</div>
                    <div style="font-size: 12px; color: var(--text-muted);">${this.formatDate(comment.created_at)}</div>
                  </div>
                  <div style="font-size: 14px; color: var(--text-secondary); line-height: 1.5;">${comment.content}</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      selectComment(commentId) {
        // Remove previous selection
        document.querySelectorAll('.comment-card').forEach(card => {
          card.style.borderColor = 'var(--border)';
          card.style.boxShadow = 'none';
        });
        
        // Add selection to current
        const card = document.querySelector(`[data-comment-id="${commentId}"]`);
        if (card) {
          card.style.borderColor = 'var(--primary-color)';
          card.style.boxShadow = '0 0 0 3px rgba(99, 102, 241, 0.1)';
        }
        
        const comment = this.comments.find(c => c.id === commentId);
        if (!comment) return;
        
        this.selectedComment = comment;
        document.getElementById('preview-author').textContent = comment.author_username || comment.author || 'Usuario';
        document.getElementById('preview-date').textContent = this.formatDate(comment.created_at);
        
        // Check if user can delete (owner or admin)
        const canDelete = this.canDelete(comment);
        const deleteBtn = document.getElementById('btn-delete-comment');
        deleteBtn.disabled = !canDelete;
        deleteBtn.style.opacity = canDelete ? '1' : '0.5';
        deleteBtn.title = canDelete ? 'Eliminar comentario' : 'Solo el autor o un admin pueden eliminar';
        
        // Enable assign button for any user (they can assign to others)
        const assignBtn = document.getElementById('btn-assign-comment');
        assignBtn.disabled = false;
        assignBtn.style.opacity = '1';
        assignBtn.title = 'Asignar comentario';
      }

      setFilter(filter) {
        this.currentFilter = filter;
        
        // Update button states
        document.querySelectorAll('.filter-btn').forEach(btn => {
          if (btn.dataset.filter === filter) {
            btn.style.background = 'var(--primary-color)';
            btn.style.color = 'white';
            btn.style.borderColor = 'var(--primary-color)';
          } else {
            btn.style.background = 'var(--surface)';
            btn.style.color = 'var(--text-primary)';
            btn.style.borderColor = 'var(--border)';
          }
        });
        
        // Show all comments (no filtering by type since tasks removed)
        this.filteredComments = [...this.comments];
        
        this.renderComments();
      }

      searchComments(query) {
        if (!query) {
          this.setFilter(this.currentFilter);
          return;
        }
        
        const lowerQuery = query.toLowerCase();
        this.filteredComments = this.comments.filter(c => 
          c.content?.toLowerCase().includes(lowerQuery) ||
          c.author?.toLowerCase().includes(lowerQuery)
        );
        
        this.renderComments();
      }

      updateStats() {
        const total = this.comments.length;

        document.getElementById('total-comments').textContent = total;
        
        // Update sidebar stats
        if (window.sidebarComponent) {
          window.sidebarComponent.updateStats({ comments: total });
        }
      }

      async saveComment() {
        const content = document.getElementById('commentContent').value.trim();
        
        if (!content) {
          alert('Por favor escribe un comentario');
          return;
        }

        try {
          await commentService.create(content, null);
          
          this.closeCommentModal();
          await this.loadComments();
        } catch (error) {
          console.error('Error saving comment:', error);
          alert('Error al guardar: ' + error.message);
        }
      }

      async deleteSelected() {
        if (!this.selectedComment) return;
        if (!this.canDelete(this.selectedComment)) {
          alert('No tienes permiso para eliminar este comentario');
          return;
        }
        this.openDeleteModal();
      }

      async confirmDelete() {
        try {
          await commentService.delete(this.selectedComment.id);
          this.closeDeleteModal();
          await this.loadComments();
        } catch (error) {
          console.error('Error deleting comment:', error);
          alert('Error al eliminar: ' + error.message);
        }
      }

      openDeleteModal() {
        document.getElementById('deleteModal').style.display = 'flex';
      }

      closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
      }

      formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      }

      openCommentModal() {
        document.getElementById('commentModal').style.display = 'flex';
        document.getElementById('commentContent').value = '';
      }

      closeCommentModal() {
        document.getElementById('commentModal').style.display = 'none';
      }

      openAssignModal() {
        this.selectedAssignees = [];
        this.updateAssigneesList();
        document.getElementById('assignModal').style.display = 'flex';
        document.getElementById('assignSelect').value = '';
      }

      closeAssignModal() {
        document.getElementById('assignModal').style.display = 'none';
        this.selectedAssignees = [];
        this.updateAssigneesList();
      }

      addAssignee(userId) {
        if (!this.selectedAssignees.includes(userId)) {
          this.selectedAssignees.push(userId);
          this.updateAssigneesList();
        }
      }

      removeAssignee(userId) {
        this.selectedAssignees = this.selectedAssignees.filter(id => id !== userId);
        this.updateAssigneesList();
      }

      updateAssigneesList() {
        const container = document.getElementById('assignUsersList');
        if (!container) return;

        if (this.selectedAssignees.length === 0) {
          container.innerHTML = '<span style="padding: 6px 12px; background: var(--surface-hover); border-radius: 8px; font-size: 12px; color: var(--text-muted);">Selecciona usuarios arriba para agregar</span>';
          return;
        }

        container.innerHTML = this.selectedAssignees.map(id => {
          const user = this.comments.find(c => c.id === id);
          if (!user) return '';
          return `
            <span style="padding: 6px 12px; background: var(--primary-color)20; border-radius: 8px; font-size: 12px; color: var(--primary-color); cursor: pointer; border: 1px solid var(--primary-color);" onclick="window.removeAssignee('${id}')">
              ${user.author_username || user.author || 'Usuario'}
              <i class="bi bi-x" style="margin-left: 4px;"></i>
            </span>
          `;
        }).join('');
      }

      async saveAssignment() {
        const assignSelect = document.getElementById('assignSelect');
        const selectedUserId = assignSelect.value;

        if (selectedUserId) {
          this.addAssignee(selectedUserId);
        }

        if (this.selectedAssignees.length > 0) {
          await this.assignComment(this.selectedAssignees);
        } else {
          alert('Por favor selecciona al menos un usuario');
        }
      }
    }

    // Initialize controller
    const commentsController = new CommentsController();
    commentsController.init();
    window.commentsController = commentsController;
    
    window.openCommentModal = () => window.commentsController.openCommentModal();
    window.closeCommentModal = () => window.commentsController.closeCommentModal();
    window.saveComment = () => window.commentsController.saveComment();
    window.setFilter = (filter) => window.commentsController.setFilter(filter);
    window.deleteSelected = () => window.commentsController.deleteSelected();
    window.confirmDelete = () => window.commentsController.confirmDelete();
    window.closeDeleteModal = () => window.commentsController.closeDeleteModal();
    window.openAssignModal = () => window.commentsController.openAssignModal();
    window.closeAssignModal = () => window.commentsController.closeAssignModal();
    window.saveAssignment = () => window.commentsController.saveAssignment();
    window.addAssignee = (userId) => window.commentsController.addAssignee(userId);
    window.removeAssignee = (userId) => window.commentsController.removeAssignee(userId);
  </script>
</body>
</html>
