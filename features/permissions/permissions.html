  <!-- Main Content -->
  <div class="container mt-4">
    <!-- Header -->

    <!-- Stats -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card bg-primary text-white">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-people me-2"></i>Total Usuarios</h5>
            <h2 id="totalUsers">0</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-danger text-white">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-person-x me-2"></i>Administradores</h5>
            <h2 id="adminCount">0</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-success text-white">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-person-check me-2"></i>Colaboradores</h5>
            <h2 id="colaboradorCount">0</h2>

      </div>

    <!-- Search -->

      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>

  <!-- Edit Role Modal -->
  <div class="modal fade" id="roleModal" tabindex="-1">

      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Cambiar Rol</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editUserId">
          <div class="mb-3">
            <label class="form-label">Nuevo Rol</label>
            <select class="form-select" id="newRole">
              <option value="admin">Administrador</option>
              <option value="colaborador">Colaborador</option>
              <option value="guest">Invitado</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="window.permissionsController.saveRole()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->

      EDGE_FUNCTION_URL: 'https://nlgcevktvqwgddibxsja.supabase.co/functions/v1'
    };
  </script>
  
  <script type="module">
    import { userService } from '../../shared/services/userServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';

    class PermissionsController {
      constructor() {
        this.users = [];
        this.init();
      }

      async init() {
        console.log('=== Permissions Controller Init ===');
        
        this.updateUserInfo();
        await this.loadUsers();
        this.setupEventListeners();
      }

      async updateUserInfo() {
        const user = await authService.getCurrentUser();
        const usernameEl = document.getElementById('nav-username');
        if (usernameEl && user) {
          usernameEl.textContent = user.username || user.full_name || user.email;
        }
      }

      async loadUsers() {
        try {
          const result = await userService.getUsers();
          this.users = result.users || [];
          console.log('Usuarios cargados:', this.users.length);
        } catch (error) {
          console.log('Error cargando usuarios:', error.message);
          this.users = [];
        }
        this.renderUsers();
        this.updateStats();
      }

      setupEventListeners() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchUsers(e.target.value));
        }
      }

      searchUsers(query) {
        if (!query) {
          this.renderUsers();
          return;
        }
        const filtered = this.users.filter(u => 
          u.username?.toLowerCase().includes(query.toLowerCase()) ||
          u.email?.toLowerCase().includes(query.toLowerCase()) ||
          u.full_name?.toLowerCase().includes(query.toLowerCase())
        );
        this.renderUsers(filtered);
      }

      renderUsers(users = null) {
        const container = document.getElementById('usersContainer');
        if (!container) return;

        const displayUsers = users || this.users;

        if (displayUsers.length === 0) {
          container.innerHTML = `
            <div class="text-center text-muted p-4">
              <i class="bi bi-people" style="font-size: 3rem;"></i>
              <p class="mt-2">No hay usuarios</p>
            </div>`;
          return;
        }

        container.innerHTML = displayUsers.map(user => {
          const roleClass = user.role === 'admin' ? 'bg-danger' : 
                          user.role === 'colaborador' ? 'bg-success' : 'bg-secondary';
          const roleLabel = user.role === 'admin' ? 'Administrador' : 
                          user.role === 'colaborador' ? 'Colaborador' : 'Invitado';
          
          return `
            <div class="card user-card mb-3">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                  <div class="user-avatar bg-primary text-white rounded-circle me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                    ${this.getInitials(user.username || user.email)}
                  </div>
                  <div>
                    <strong>${user.username || user.email}</strong>
                    <br><small class="text-muted">${user.email}</small>
                  </div>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span class="badge role-badge ${roleClass}">${roleLabel}</span>
                  <button class="btn btn-sm btn-outline-primary" onclick="window.permissionsController.openRoleModal('${user.id}', '${user.role}')">
                    <i class="bi bi-pencil"></i>
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      updateStats() {
        const total = this.users.length;
        const admins = this.users.filter(u => u.role === 'admin').length;
        const cols = this.users.filter(u => u.role === 'colaborador').length;

        document.getElementById('totalUsers').textContent = total;
        document.getElementById('adminCount').textContent = admins;
        document.getElementById('colaboradorCount').textContent = cols;
      }

      getInitials(name) {
        if (!name) return 'U';
        return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      }

      openRoleModal(userId, currentRole) {
        document.getElementById('editUserId').value = userId;
        document.getElementById('newRole').value = currentRole || 'colaborador';
        new bootstrap.Modal(document.getElementById('roleModal')).show();
      }

      async saveRole() {
        const userId = document.getElementById('editUserId').value;
        const newRole = document.getElementById('newRole').value;

        try {
          await userService.setUserRole(userId, newRole);
          
          const modal = bootstrap.Modal.getInstance(document.getElementById('roleModal'));
          if (modal) modal.hide();
          
          await this.loadUsers();
          alert('Rol actualizado correctamente');
        } catch (error) {
          console.error('Error updating role:', error);
          alert('Error al actualizar rol: ' + error.message);
        }
      }
    }

    window.permissionsController = new PermissionsController();
    
    window.handleLogout = async function() {
      await authService.logout();
      window.location.href = '../auth/login.html';
    };
  </script>
