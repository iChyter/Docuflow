  <!-- Main Content -->

    </div>

    <!-- Stats Cards -->
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card bg-primary text-white">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-journal-text me-2"></i>Total Logs</h5>
            <h2 id="totalLogs">0</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-success text-white">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-check-circle me-2"></i>Exitosos</h5>
            <h2 id="successLogs">0</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-danger text-white">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-x-circle me-2"></i>Errores</h5>

          </div>

    <!-- Filters -->

            <option value="logout">Logouts</option>

        <div class="col-md-4">

            <option value="">Todos los estados</option>
            <option value="success">Exitoso</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div class="col-md-4">

      EDGE_FUNCTION_URL: 'https://nlgcevktvqwgddibxsja.supabase.co/functions/v1'
    };
  </script>
  
  <script type="module">
    import { logService } from '../../shared/services/logServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';

    class LogsController {
      constructor() {
        this.logs = [];
        this.filteredLogs = [];
        this.currentPage = 1;
        this.perPage = 20;
        this.init();
      }

      async init() {
        console.log('=== Logs Controller Init ===');
        
        this.updateUserInfo();
        await this.loadLogs();
        this.setupEventListeners();
      }

      async updateUserInfo() {
        const user = await authService.getCurrentUser();
        const usernameEl = document.getElementById('nav-username');
        if (usernameEl && user) {
          usernameEl.textContent = user.username || user.full_name || user.email;
        }
      }

      async loadLogs() {
        try {
          const result = await logService.list(100);
          this.logs = Array.isArray(result) ? result : [];
          this.filteredLogs = [...this.logs];
          console.log('Logs cargados:', this.logs.length);
        } catch (error) {
          console.log('Error cargando logs:', error.message);
          this.logs = [];
          this.filteredLogs = [];
        }
        this.renderLogs();
        this.updateStats();
      }

      setupEventListeners() {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchLogs(e.target.value));
        }

        const actionFilter = document.getElementById('actionFilter');
        if (actionFilter) {
          actionFilter.addEventListener('change', () => this.applyFilters());
        }

        const statusFilter = document.getElementById('statusFilter');
        if (statusFilter) {
          statusFilter.addEventListener('change', () => this.applyFilters());
        }
      }

      applyFilters() {
        const action = document.getElementById('actionFilter').value;
        const status = document.getElementById('statusFilter').value;
        
        this.filteredLogs = this.logs.filter(log => {
          if (action && !log.action?.toLowerCase().includes(action.toLowerCase())) {
            return false;
          }
          if (status === 'success' && log.details?.toLowerCase().includes('error')) {
            return false;
          }
          if (status === 'error' && !log.details?.toLowerCase().includes('error')) {
            return false;
          }
          return true;
        });
        
        this.currentPage = 1;
        this.renderLogs();
      }

      searchLogs(query) {
        if (!query) {
          this.applyFilters();
          return;
        }
        
        const lowerQuery = query.toLowerCase();
        const searched = this.filteredLogs.filter(log => 
          log.action?.toLowerCase().includes(lowerQuery) ||
          log.details?.toLowerCase().includes(lowerQuery) ||
          log.user_email?.toLowerCase().includes(lowerQuery)
        );
        
        this.renderLogs(searched);
      }

      renderLogs(logs = null) {
        const container = document.getElementById('logsContainer');
        if (!container) return;

        const displayLogs = logs || this.filteredLogs;
        
        if (displayLogs.length === 0) {
          container.innerHTML = `
            <div class="text-center text-muted p-4">
              <i class="bi bi-journal-x" style="font-size: 3rem;"></i>
              <p class="mt-2">No hay logs</p>
            </div>`;
          return;
        }

        const start = (this.currentPage - 1) * this.perPage;
        const paginatedLogs = displayLogs.slice(start, start + this.perPage);

        container.innerHTML = paginatedLogs.map(log => {
          const logClass = log.details?.toLowerCase().includes('error') ? 'error' : 
                          log.details?.toLowerCase().includes('success') ? 'success' : 'info';
          const icon = logClass === 'error' ? 'bi-x-circle' : 
                      logClass === 'success' ? 'bi-check-circle' : 'bi-info-circle';
          
          return `
            <div class="card log-entry ${logClass} mb-2">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                  <div class="d-flex align-items-center">
                    <i class="bi ${icon} me-2 ${logClass === 'error' ? 'text-danger' : logClass === 'success' ? 'text-success' : 'text-primary'}"></i>
                    <div>
                      <strong>${log.action || 'Acción'}</strong>
                      <small class="text-muted ms-2">${log.user_email || log.profiles?.username || 'Usuario'}</small>
                    </div>
                  </div>
                  <small class="log-timestamp">${this.formatDate(log.created_at)}</small>
                </div>
                <p class="mb-0 mt-2 text-muted">${log.details || ''}</p>
              </div>
            </div>
          `;
        }).join('');

        this.renderPagination(displayLogs.length);
      }

      renderPagination(totalItems) {
        const totalPages = Math.ceil(totalItems / this.perPage);
        const pagination = document.getElementById('pagination');
        
        if (!pagination) return;
        
        let html = '';
        
        if (totalPages > 1) {
          html += `<li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="window.logsController.goToPage(${this.currentPage - 1})">Anterior</a>
          </li>`;
          
          for (let i = 1; i <= totalPages; i++) {
            html += `<li class="page-item ${this.currentPage === i ? 'active' : ''}">
              <a class="page-link" href="#" onclick="window.logsController.goToPage(${i})">${i}</a>
            </li>`;
          }
          
          html += `<li class="page-item ${this.currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="window.logsController.goToPage(${this.currentPage + 1})">Siguiente</a>
          </li>`;
        }
        
        pagination.innerHTML = html;
      }

      goToPage(page) {
        this.currentPage = page;
        this.renderLogs();
      }

      updateStats() {
        const total = this.logs.length;
        const errors = this.logs.filter(l => l.details?.toLowerCase().includes('error')).length;
        const success = total - errors;

        document.getElementById('totalLogs').textContent = total;
        document.getElementById('errorLogs').textContent = errors;
        document.getElementById('successLogs').textContent = success;
      }

      formatDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        return date.toLocaleDateString('es-ES', { 
          day: 'numeric', 
          month: 'short', 
          hour: '2-digit', 
          minute: '2-digit' 
        });
      }

      exportLogs() {
        const csv = this.filteredLogs.map(log => 
          `${log.created_at},${log.action},${log.user_email || ''},${log.details || ''}`
        ).join('\n');
        
        const blob = new Blob([`Fecha,Acción,Usuario,Detalles\n${csv}`], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `logs_${new Date().toISOString()}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }
    }

    window.logsController = new LogsController();
    
    window.handleLogout = async function() {
      await authService.logout();
      window.location.href = '../auth/login.html';
    };
  </script>
