<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Permisos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/slothui.css">
  <link rel="stylesheet" href="../../shared/styles/desktop.css" media="(min-width: 1201px)">
  <link rel="stylesheet" href="../../shared/styles/tablet.css" media="(min-width: 769px) and (max-width: 1200px)">
  <link rel="stylesheet" href="../../shared/styles/phone.css" media="(max-width: 768px)">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Compartido -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Content -->
    <main class="main-content">

      <div class="content">
        <!-- Stats -->
        <div class="row" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;">
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-people" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="total-users">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Total Usuarios</div>
              </div>
            </div>
          </div>
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--danger); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-shield-check" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="admin-count">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Administradores</div>
              </div>
            </div>
          </div>
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--success); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-person-check" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="colaborador-count">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Colaboradores</div>
              </div>
            </div>
          </div>
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--info); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-eye" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="usuario-count">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Usuarios</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Users List -->
        <div id="users-list" style="display: flex; flex-direction: column; gap: 16px;">
          <!-- Users will be loaded here -->
        </div>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="right-sidebar-container">
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Usuario Seleccionado</span>
        </div>
        
        <div class="file-preview" id="user-preview">
          <div class="file-preview-icon" style="background: var(--surface-hover);">
            <i class="bi bi-person" style="color: var(--primary-color); font-size: 32px;"></i>
          </div>
          <div class="file-preview-title" id="preview-username">Selecciona un usuario</div>
          <div class="file-preview-meta" id="preview-email">-</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Cambiar Rol</span>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <select id="newRole" disabled style="padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Geologica', sans-serif; background: var(--surface-hover);">
            <option value="admin">Administrador</option>
            <option value="colaborador">Colaborador</option>
            <option value="usuario">Usuario</option>
          </select>
          <button class="btn-primary" id="btn-save-role" disabled onclick="window.saveRole()">
            <i class="bi bi-check-lg"></i> Guardar Cambios
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Create User Modal -->
  <div class="modal" id="createUserModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
    <div style="background: var(--surface); border-radius: 16px; width: 100%; max-width: 400px; margin: 20px;">
      <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <h5 style="margin: 0;">Crear Usuario</h5>
        <button onclick="window.closeCreateUserModal()" style="background:none;border:none;font-size:24px;cursor:pointer;">&times;</button>
      </div>
      <div style="padding: 20px;">
        <div style="margin-bottom: 15px;">
          <label style="display:block;margin-bottom:5px;font-size:14px;">Email *</label>
          <input type="email" id="newUserEmail" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;">
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display:block;margin-bottom:5px;font-size:14px;">Contraseña *</label>
          <input type="password" id="newUserPassword" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;">
        </div>
      </div>
      <div style="padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px;">
        <button onclick="window.closeCreateUserModal()" style="padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;">Cancelar</button>
        <button class="btn-primary" onclick="window.createUser()">Crear</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Sidebar Component -->
  <script type="module" src="../../shared/components/sidebar.js"></script>
  <script type="module" src="../../shared/components/rightSidebar.js"></script>
  
  <script>
    window.APP_CONFIG = {
      SUPABASE_URL: 'https://nlgcevktvqwgddibxsja.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZ2Nldmt0dnF3Z2RkaWJ4c2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTEzMDIsImV4cCI6MjA4OTI2NzMwMn0.bGRQHbEcrQMKnacIqM76aCS86wOEyL1p4O-4enZypXE'
    };
  </script>
  
  <script type="module">
    import { userService } from '../../shared/services/userServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';
    import { initPermissionGuard, permissionService } from '../../shared/services/permissionGuard.js';

    class PermissionsController {
      constructor() {
        this.users = [];
        this.selectedUser = null;
        this.isAdmin = false;
        this.canManagePermissions = false;
        this.canCreateUsers = false;
        this.canDeleteUsers = false;
      }

      async init() {
        // Verificar permisos usando el nuevo sistema
        const hasAccess = await initPermissionGuard({
          module: 'usuarios',
          permission: 'ver',
          redirectTo: '../dashboard/dashboard.html'
        });
        
        if (!hasAccess) return;
        
        // Cargar permisos específicos
        await this.loadPermissions();
        await this.loadUsers();
        this.setupEventListeners();
        this.updateUIForRole();
      }

      async loadPermissions() {
        try {
          this.isAdmin = await permissionService.isAdmin();
          this.canManagePermissions = await permissionService.canManagePermissions();
          this.canCreateUsers = await permissionService.canCreateUsers();
          this.canDeleteUsers = await permissionService.canDeleteUsers();
          
          console.log('[Permissions] Permisos cargados:', {
            isAdmin: this.isAdmin,
            canManagePermissions: this.canManagePermissions,
            canCreateUsers: this.canCreateUsers,
            canDeleteUsers: this.canDeleteUsers
          });
        } catch (error) {
          console.error('[Permissions] Error cargando permisos:', error);
          this.isAdmin = false;
          this.canManagePermissions = false;
          this.canCreateUsers = false;
          this.canDeleteUsers = false;
        }
      }

      updateUIForRole() {
        console.log('[Permissions] Actualizando UI, permisos:', {
          isAdmin: this.isAdmin,
          canCreateUsers: this.canCreateUsers,
          canManagePermissions: this.canManagePermissions
        });
        
        // Botón de crear usuario
        const createBtn = document.getElementById('btn-create-user');
        if (createBtn) {
          createBtn.style.display = this.canCreateUsers ? 'flex' : 'none';
        }
        
        // Select de roles y botón guardar
        const roleSelect = document.getElementById('newRole');
        const saveBtn = document.getElementById('btn-save-role');
        
        if (roleSelect && !this.canManagePermissions) {
          roleSelect.disabled = true;
          roleSelect.title = 'No tienes permiso para gestionar roles';
        }
        
        if (saveBtn && !this.canManagePermissions) {
          saveBtn.disabled = true;
          saveBtn.style.opacity = '0.5';
          saveBtn.title = 'No tienes permiso para guardar cambios de rol';
        }
        
        // Mensaje si no puede gestionar permisos
        const roleSection = document.querySelector('.sidebar-section:last-child');
        if (roleSection && !this.canManagePermissions) {
          let msg = document.getElementById('admin-msg');
          if (!msg) {
            msg = document.createElement('div');
            msg.id = 'admin-msg';
            msg.style.cssText = 'padding:10px;background:var(--surface-hover);border-radius:8px;font-size:12px;color:var(--text-muted);margin-top:8px;';
            msg.innerHTML = '<i class="bi bi-lock"></i> Solo administradores pueden gestionar roles y permisos';
            roleSection.querySelector('div').appendChild(msg);
          }
        }
      }

      async loadUsers() {
        // Try direct query first (works for everyone with RLS)
        try {
          const { supabase } = await import('../../shared/services/supabaseClient.js');
          const { data, error } = await supabase
            .from('profiles')
            .select('id, username, full_name, role, avatar_url, created_at')
            .order('created_at', { ascending: false });
          
          console.log('Loaded profiles:', data);
          
          if (error) {
            console.error('Supabase error:', error);
            this.users = [];
          } else {
            this.users = data || [];
          }
        } catch (error) {
          console.error('Error loading users:', error);
          this.users = [];
        }
        
        this.renderUsers();
        this.updateStats();
      }

      setupEventListeners() {
        const searchInput = document.getElementById('searchUsers');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchUsers(e.target.value));
        }
      }

      renderUsers() {
        const container = document.getElementById('users-list');
        if (!container) return;

        if (this.users.length === 0) {
          container.innerHTML = '<div style="text-align: center; padding: 60px; color: var(--text-muted);">No hay usuarios</div>';
          return;
        }

        const roleClasses = {
          'admin': 'var(--danger)',
          'colaborador': 'var(--success)',
          'usuario': 'var(--info)'
        };
        
        const roleLabels = {
          'admin': 'Administrador',
          'colaborador': 'Colaborador',
          'usuario': 'Usuario'
        };

        container.innerHTML = this.users.map(user => {
          const roleClass = roleClasses[user.role] || 'var(--text-muted)';
          const roleLabel = roleLabels[user.role] || 'Usuario';
          const displayName = user.username || user.full_name || 'Usuario';
          
          return `
            <div class="card" onclick="window.permissionsController.selectUser('${user.id}')" data-user-id="${user.id}" style="padding: 20px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 16px;">
                  <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px;">
                    ${this.getInitials(displayName)}
                  </div>
                  <div>
                    <div style="font-weight: 600; font-size: 16px; color: var(--text-primary);">${displayName}</div>
                    <div style="font-size: 13px; color: var(--text-muted);">${user.full_name || '-'}</div>
                  </div>
                </div>
                <span style="padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; background: ${roleClass}20; color: ${roleClass};">
                  ${roleLabel}
                </span>
              </div>
            </div>
          `;
        }).join('');
      }

      selectUser(userId) {
        document.querySelectorAll('[data-user-id]').forEach(card => {
          card.style.borderColor = 'var(--border)';
          card.style.boxShadow = 'none';
        });
        
        const card = document.querySelector(`[data-user-id="${userId}"]`);
        if (card) {
          card.style.borderColor = 'var(--primary-color)';
          card.style.boxShadow = '0 0 0 3px rgba(99, 102, 241, 0.1)';
        }
        
        const user = this.users.find(u => u.id === userId);
        if (!user) return;
        
        this.selectedUser = user;
        const displayName = user.username || user.full_name || 'Usuario';
        document.getElementById('preview-username').textContent = displayName;
        document.getElementById('preview-email').textContent = user.full_name || '-';
        document.getElementById('newRole').value = user.role || 'colaborador';
        
        console.log('selectUser - isAdmin:', this.isAdmin);
        
        // Enable editing only if admin
        const roleSelect = document.getElementById('newRole');
        const saveBtn = document.getElementById('btn-save-role');
        
        roleSelect.disabled = !this.isAdmin;
        saveBtn.disabled = !this.isAdmin;
        
        if (!this.isAdmin) {
          saveBtn.title = 'Solo administradores pueden cambiar roles';
        } else {
          saveBtn.title = '';
        }
      }

      updateStats() {
        const total = this.users.length;
        const admins = this.users.filter(u => u.role === 'admin').length;
        const cols = this.users.filter(u => u.role === 'colaborador').length;
        const usuarios = this.users.filter(u => u.role === 'usuario').length;

        document.getElementById('total-users').textContent = total;
        document.getElementById('admin-count').textContent = admins;
        document.getElementById('usuario-count').textContent = usuarios;
        document.getElementById('colaborador-count').textContent = cols;
      }

      searchUsers(query) {
        if (!query) {
          this.renderUsers();
          return;
        }
        
        const filtered = this.users.filter(u => 
          u.username?.toLowerCase().includes(query.toLowerCase()) ||
          u.email?.toLowerCase().includes(query.toLowerCase())
        );
        
        const allUsers = this.users;
        this.users = filtered;
        this.renderUsers();
        this.users = allUsers;
      }

      async saveRole() {
        if (!this.selectedUser) return;
        
        if (!this.isAdmin) {
          alert('Solo los administradores pueden cambiar roles');
          return;
        }
        
        const newRole = document.getElementById('newRole').value;
        
        try {
          await userService.setUserRole(this.selectedUser.id, newRole);
          await this.loadUsers();
          alert('Rol actualizado correctamente');
        } catch (error) {
          console.error('Error saving role:', error);
          alert('Error al actualizar rol: ' + error.message);
        }
      }

      getInitials(name) {
        if (!name) return 'U';
        return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      }
    }

    window.permissionsController = new PermissionsController();
    
    window.permissionsController.init();
    
    // Wait for sidebar to be ready
    window.addEventListener('sidebarReady', () => {
      // Sidebar loaded - update user info if needed
    });
    
    window.saveRole = () => window.permissionsController.saveRole();
    
    window.openCreateUserModal = () => {
      document.getElementById('createUserModal').style.display = 'flex';
    };
    
    window.closeCreateUserModal = () => {
      document.getElementById('createUserModal').style.display = 'none';
    };
    
    window.createUser = async () => {
      const email = document.getElementById('newUserEmail').value.trim();
      const password = document.getElementById('newUserPassword').value;
      
      if (!email || !password) {
        alert('Completa email y contraseña');
        return;
      }
      
      if (password.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres');
        return;
      }
      
      try {
        await userService.createUser(email, password);
        window.closeCreateUserModal();
        await window.permissionsController.loadUsers();
        alert('Usuario creado. Seleccionalo para asignarle rol.');
      } catch (error) {
        alert('Error: ' + error.message);
      }
    };
  </script>
</body>
</html>
