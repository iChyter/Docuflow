<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/styles/slothui.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Container - Componente Compartido -->
    <aside class="sidebar" id="sidebar-container"></aside>

    <!-- Main Content -->
    <main class="main-content">

      <div class="content">
        <!-- Stats -->
        <div class="row" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px;">
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-journal-text" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="total-logs">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Total Logs</div>
              </div>
            </div>
          </div>
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--success); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-check-circle" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="success-logs">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Exitosos</div>
              </div>
            </div>
          </div>
          <div class="card" style="padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="width: 48px; height: 48px; background: var(--danger); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-x-circle" style="color: white; font-size: 24px;"></i>
              </div>
              <div>
                <div style="font-size: 24px; font-weight: 700;" id="error-logs">0</div>
                <div style="font-size: 13px; color: var(--text-muted);">Errores</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div style="display: flex; gap: 10px; margin-bottom: 24px;">
          <select id="actionFilter" style="padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-family: 'Geologica', sans-serif;">
            <option value="">Todas las acciones</option>
            <option value="upload">Subidas</option>
            <option value="download">Descargas</option>
            <option value="delete">Eliminaciones</option>
            <option value="login">Logins</option>
          </select>
          <button class="btn-filter" onclick="window.applyFilters()">
            <i class="bi bi-funnel"></i> Filtrar
          </button>
        </div>

        <!-- Logs Table -->
        <div class="table-section">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Acción</th>
                  <th>Usuario</th>
                  <th>Detalles</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody id="logs-table-body">
                <!-- Logs will be loaded here -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <nav style="margin-top: 24px;">
          <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar" id="right-sidebar-container">
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Resumen</span>
        </div>
        
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label"><i class="bi bi-upload"></i> Subidas</div>
            <div class="stat-value" id="stat-uploads">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><i class="bi bi-download"></i> Descargas</div>
            <div class="stat-value" id="stat-downloads">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><i class="bi bi-trash"></i> Eliminaciones</div>
            <div class="stat-value" id="stat-deletes">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><i class="bi bi-person"></i> Logins</div>
            <div class="stat-value" id="stat-logins">0</div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    window.APP_CONFIG = {
      SUPABASE_URL: 'https://nlgcevktvqwgddibxsja.supabase.co',
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZ2Nldmt0dnF3Z2RkaWJ4c2phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTEzMDIsImV4cCI6MjA4OTI2NzMwMn0.bGRQHbEcrQMKnacIqM76aCS86wOEyL1p4O-4enZypXE'
    };
  </script>
  
  <!-- Sidebar Component -->
  <script type="module" src="../../shared/components/sidebar.js"></script>
  <script type="module" src="../../shared/components/rightSidebar.js"></script>
  
  <script type="module">
    import { logService } from '../../shared/services/logServiceSupabase.js';
    import { authService } from '../../shared/services/authServiceSupabase.js';

    class LogsController {
      constructor() {
        this.logs = [];
        this.filteredLogs = [];
        this.currentPage = 1;
        this.perPage = 20;
        this.loading = false;
      }

      async init() {
        if (this.loading) return;
        this.loading = true;
        
        await this.loadLogs();
        this.setupEventListeners();
        
        this.loading = false;
      }

      async loadLogs() {
        try {
          const result = await logService.list(100);
          this.logs = Array.isArray(result) ? result : [];
          this.filteredLogs = [...this.logs];
        } catch (error) {
          console.error('Error loading logs:', error);
          this.logs = [];
          this.filteredLogs = [];
        }
        this.renderLogs();
        this.updateStats();
      }

      setupEventListeners() {
        const searchInput = document.getElementById('searchLogs');
        if (searchInput) {
          searchInput.addEventListener('input', (e) => this.searchLogs(e.target.value));
        }
      }

      renderLogs() {
        const tbody = document.getElementById('logs-table-body');
        if (!tbody) return;

        if (this.filteredLogs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: var(--text-muted);">No hay logs</td></tr>';
          return;
        }

        const start = (this.currentPage - 1) * this.perPage;
        const paginatedLogs = this.filteredLogs.slice(start, start + this.perPage);

        tbody.innerHTML = paginatedLogs.map(log => {
          const isError = log.details?.toLowerCase().includes('error');
          const iconClass = isError ? 'text-danger' : 'text-success';
          const icon = isError ? 'bi-x-circle' : 'bi-check-circle';
          
          return `
            <tr>
              <td>
                <div style="display: flex; align-items: center; gap: 10px;">
                  <i class="bi ${icon} ${iconClass}"></i>
                  <span style="font-weight: 500;">${log.action || 'Acción'}</span>
                </div>
              </td>
              <td style="color: var(--text-secondary);">${log.user_email || log.profiles?.username || 'Usuario'}</td>
              <td style="color: var(--text-muted);">${log.details || '-'}</td>
              <td style="color: var(--text-muted); font-size: 13px;">${this.formatDate(log.created_at)}</td>
            </tr>
          `;
        }).join('');

        this.renderPagination();
      }

      renderPagination() {
        const totalPages = Math.ceil(this.filteredLogs.length / this.perPage);
        const pagination = document.getElementById('pagination');
        
        if (!pagination || totalPages <= 1) {
          if (pagination) pagination.innerHTML = '';
          return;
        }
        
        let html = '';
        html += `<li class="page-item ${this.currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="window.logsController.goToPage(${this.currentPage - 1}); return false;">Anterior</a></li>`;
        
        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${this.currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="window.logsController.goToPage(${i}); return false;">${i}</a></li>`;
        }
        
        html += `<li class="page-item ${this.currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="window.logsController.goToPage(${this.currentPage + 1}); return false;">Siguiente</a></li>`;
        
        pagination.innerHTML = html;
      }

      goToPage(page) {
        this.currentPage = page;
        this.renderLogs();
      }

      searchLogs(query) {
        if (!query) {
          this.filteredLogs = [...this.logs];
        } else {
          const lowerQuery = query.toLowerCase();
          this.filteredLogs = this.logs.filter(log => 
            log.action?.toLowerCase().includes(lowerQuery) ||
            log.details?.toLowerCase().includes(lowerQuery)
          );
        }
        this.currentPage = 1;
        this.renderLogs();
      }

      applyFilters() {
        const action = document.getElementById('actionFilter').value;
        
        if (!action) {
          this.filteredLogs = [...this.logs];
        } else {
          this.filteredLogs = this.logs.filter(log => 
            log.action?.toLowerCase().includes(action.toLowerCase())
          );
        }
        
        this.currentPage = 1;
        this.renderLogs();
      }

      updateStats() {
        const total = this.logs.length;
        const errors = this.logs.filter(l => l.details?.toLowerCase().includes('error')).length;
        const success = total - errors;
        
        const uploads = this.logs.filter(l => l.action?.toLowerCase().includes('upload')).length;
        const downloads = this.logs.filter(l => l.action?.toLowerCase().includes('download')).length;
        const deletes = this.logs.filter(l => l.action?.toLowerCase().includes('delete')).length;
        const logins = this.logs.filter(l => l.action?.toLowerCase().includes('login')).length;

        document.getElementById('total-logs').textContent = total;
        document.getElementById('success-logs').textContent = success;
        document.getElementById('error-logs').textContent = errors;
        
        document.getElementById('stat-uploads').textContent = uploads;
        document.getElementById('stat-downloads').textContent = downloads;
        document.getElementById('stat-deletes').textContent = deletes;
        document.getElementById('stat-logins').textContent = logins;
      }

      exportLogs() {
        const csv = this.logs.map(log => 
          `${log.created_at},${log.action},${log.user_email || ''},${log.details || ''}`
        ).join('\n');
        
        const blob = new Blob([`Fecha,Acción,Usuario,Detalles\n${csv}`], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `logs_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }

      formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      }
    }

    // Initialize controller
    const logsController = new LogsController();
    window.logsController = logsController;
    logsController.init();
    
    window.applyFilters = () => window.logsController.applyFilters();
    window.exportLogs = () => window.logsController.exportLogs();
  </script>
</body>
</html>
