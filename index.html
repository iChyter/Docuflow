<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuFlow - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles/slothui.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .quick-access-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .quick-access-card {
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .quick-access-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-color: var(--primary-light);
    }
    .quick-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 24px;
    }
    .stat-card {
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
  
  <!-- Mobile Overlay -->
  <div class="mobile-overlay" onclick="toggleSidebar()"></div>
  
  <!-- Sidebar Container -->
  <aside class="sidebar closed" id="sidebar-container"></aside>
  
  <!-- Right Sidebar -->
  <aside class="right-sidebar closed" id="right-sidebar-container"></aside>
  
  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
      <div>
        <h1 style="margin-bottom: 8px;">Dashboard</h1>
        <p style="color: var(--text-secondary);">Bienvenido a DocuFlow</p>
      </div>
      <div id="userInfo" style="text-align: right;">
        <p style="margin: 0; font-weight: 600;" id="welcome-message">Cargando...</p>
      </div>
    </div>
    
    <!-- Quick Access -->
    <div class="quick-access-grid">
      <a href="files/upload.html" class="quick-access-card">
        <div class="quick-icon" style="background: var(--primary-light); color: var(--primary-color);">
          <i class="bi bi-cloud-upload"></i>
        </div>
        <h3 style="font-size: 16px; margin-bottom: 8px;">Subir Archivos</h3>
        <p style="font-size: 14px; color: var(--text-secondary);">Sube nuevos documentos</p>
      </a>
      
      <a href="dashboard/dashboard.html" class="quick-access-card">
        <div class="quick-icon" style="background: var(--info-light); color: var(--info);">
          <i class="bi bi-speedometer2"></i>
        </div>
        <h3 style="font-size: 16px; margin-bottom: 8px;">Dashboard</h3>
        <p style="font-size: 14px; color: var(--text-secondary);">Ver estadísticas</p>
      </a>
      
      <a href="comments/comments.html" class="quick-access-card">
        <div class="quick-icon" style="background: var(--success-light); color: var(--success);">
          <i class="bi bi-chat-dots"></i>
        </div>
        <h3 style="font-size: 16px; margin-bottom: 8px;">Comentarios</h3>
        <p style="font-size: 14px; color: var(--text-secondary);">Ver y asignar comentarios</p>
      </a>
      
      <a href="files/upload.html" class="quick-access-card">
        <div class="quick-icon" style="background: var(--warning-light); color: var(--warning);">
          <i class="bi bi-search"></i>
        </div>
        <h3 style="font-size: 16px; margin-bottom: 8px;">Buscar Archivos</h3>
        <p style="font-size: 14px; color: var(--text-secondary);">Buscar documentos</p>
      </a>
      
      <a href="permissions/permissions.html" class="quick-access-card">
        <div class="quick-icon" style="background: var(--danger-light); color: var(--danger);">
          <i class="bi bi-shield-check"></i>
        </div>
        <h3 style="font-size: 16px; margin-bottom: 8px;">Gestionar Permisos</h3>
        <p style="font-size: 14px; color: var(--text-secondary);">Admin solo</p>
      </a>
      
      <a href="logs/logs.html" class="quick-access-card">
        <div class="quick-icon" style="background: var(--secondary-light); color: var(--secondary);">
          <i class="bi bi-journal-text"></i>
        </div>
        <h3 style="font-size: 16px; margin-bottom: 8px;">Logs</h3>
        <p style="font-size: 14px; color: var(--text-secondary);">Admin solo</p>
      </a>
    </div>
    
    <!-- Stats -->
    <div class="grid-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-files">0</div>
        <div class="stat-label">Archivos</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-value" id="stat-comments">0</div>
        <div class="stat-label">Comentarios</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-value" id="stat-users">0</div>
        <div class="stat-label">Usuarios</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-value" id="stat-notifications">0</div>
        <div class="stat-label">Notificaciones</div>
      </div>
    </div>
  </main>
  
  <!-- Scripts -->
  <script type="module" src="../shared/components/sidebar.js"></script>
  <script type="module" src="../shared/components/rightSidebar.js"></script>
  
  <script type="module">
    import { authService } from '../shared/services/authServiceSupabase.js';
    import { profileService } from '../shared/services/profileService.js';
    import { commentService } from '../shared/services/commentServiceSupabase.js';
    import { supabase } from '../shared/services/supabaseClient.js';
    
    let sidebarComponent = null;
    let rightSidebarComponent = null;
    
    async function toggleSidebar() {
      const sidebar = document.getElementById('sidebar-container');
      const rightSidebar = document.getElementById('right-sidebar-container');
      const overlay = document.querySelector('.mobile-overlay');
      
      const isOpen = sidebar.classList.contains('open');
      
      if (isOpen) {
        // Cerrar sidebar
        sidebar.classList.remove('open');
        sidebar.classList.add('closed');
        rightSidebar.classList.remove('open');
        rightSidebar.classList.add('closed');
        overlay.classList.remove('active');
      } else {
        // Abrir sidebar
        sidebar.classList.remove('closed');
        sidebar.classList.add('open');
        rightSidebar.classList.remove('closed');
        rightSidebar.classList.add('open');
        overlay.classList.add('active');
      }
    }
    
    async function loadStats() {
      try {
        // Load files
        const { data: files } = await supabase
          .from('documents')
          .select('id')
          .eq('is_deleted', false);
        
        // Load comments
        const comments = await commentService.list(100);
        
        // Load profiles
        const { data: profiles } = await supabase
          .from('profiles')
          .select('id');
        
        // Load notifications
        const { data: notifications } = await supabase
          .from('notifications')
          .select('id')
          .eq('is_active', true);
        
        document.getElementById('stat-files').textContent = files?.length || 0;
        document.getElementById('stat-comments').textContent = comments?.length || 0;
        document.getElementById('stat-users').textContent = profiles?.length || 0;
        document.getElementById('stat-notifications').textContent = notifications?.length || 0;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }
    
    async function loadUserInfo() {
      try {
        const user = await authService.getCurrentUser();
        if (user) {
          const profile = await profileService.getCurrentProfile();
          document.getElementById('welcome-message').textContent = 
            `Bienvenido, ${profile?.full_name || profile?.username || 'Usuario'}`;
        }
      } catch (error) {
        console.error('Error loading user info:', error);
      }
    }
    
    async function init() {
      await loadUserInfo();
      await loadStats();
      
      // Load sidebar
      const { default: SidebarComponent } = await import('../shared/components/sidebar.js');
      sidebarComponent = new SidebarComponent();
      sidebarComponent.init();
      
      // Load right sidebar
      const { default: RightSidebarComponent } = await import('../shared/components/rightSidebar.js');
      rightSidebarComponent = new RightSidebarComponent();
      rightSidebarComponent.init();
    }
    
    init();
  </script>
</body>
</html>
